services:
  mongodb:
    image: mongo:7
    container_name: smartchain-mongo
    ports:
      - "27017:27017"
    volumes:
      - smartchain_mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartchain-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  smartchain_mongo_data:
