name: Deploy Microservices

on:
  push:
    branches:
      - main
    paths:
      - 'microservices/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      
      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only HEAD^ HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt
          
          # Identify which microservices were changed
          SERVICES=""
          if grep -q "microservices/iam/" changed_files.txt; then
            SERVICES="$SERVICES iam"
          fi
          if grep -q "microservices/sales/" changed_files.txt; then
            SERVICES="$SERVICES sales"
          fi
          if grep -q "microservices/inventory/" changed_files.txt; then
            SERVICES="$SERVICES inventory"
          fi
          if grep -q "microservices/warehouse/" changed_files.txt; then
            SERVICES="$SERVICES warehouse"
          fi
          if grep -q "microservices/logistics/" changed_files.txt; then
            SERVICES="$SERVICES logistics"
          fi
          
          echo "Changed services: $SERVICES"
          echo "CHANGED_SERVICES=$SERVICES" >> $GITHUB_ENV
      
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to EC2
        run: |
          # Pull latest changes
          ssh ubuntu@${{ secrets.EC2_HOST }} "cd ~/smart-chain && git pull"
          
          # Install dependencies and restart services for changed microservices
          for service in ${{ env.CHANGED_SERVICES }}; do
            echo "Deploying $service microservice..."
            ssh ubuntu@${{ secrets.EC2_HOST }} "cd ~/smart-chain/microservices/$service && npm ci && pm2 restart $service"
          done
          
          # Check service status
          ssh ubuntu@${{ secrets.EC2_HOST }} "pm2 status"
